<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zemli - Карта мира</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #1a1a1a;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #000;
            cursor: grab;
        }

        #gameCanvas:active {
            cursor: grabbing;
        }

        .action-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
            background: rgba(30, 30, 30, 0.9);
            border: 2px solid #444;
            border-radius: 30px;
            padding: 10px 14px;
            backdrop-filter: blur(5px);
        }

        .action-btn {
            min-width: 120px;
            height: 46px;
            border-radius: 20px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #555;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .action-btn:hover {
            background: #3a3a3a;
            border-color: #888;
        }

        .action-btn.active {
            background: #4a6a8a;
            border-color: #aaddff;
        }

        @media (max-width: 900px) {
            .action-panel {
                width: calc(100vw - 20px);
                bottom: 10px;
                gap: 6px;
                padding: 8px;
            }

            .action-btn {
                min-width: 0;
                flex: 1;
                height: 44px;
                font-size: 14px;
            }
        }

        .coordinates {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-family: monospace;
            border: 1px solid #444;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .biome-info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #444;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .title {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid #444;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .inventory-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #444;
            border-radius: 10px;
            padding: 10px;
            color: white;
            z-index: 1000;
            max-width: 240px;
            max-height: 55vh;
            overflow-y: auto;
        }

        .inv-title {
            text-align: center;
            margin-bottom: 10px;
            color: #ffd700;
            font-weight: bold;
        }

        .inv-btn {
            width: 100%;
            margin: 5px 0;
            padding: 8px;
            background: #2a2a2a;
            border: 1px solid #555;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            font-size: 13px;
        }

        .inv-btn:hover {
            background: #3a3a3a;
        }

        .inv-btn.selected {
            background: #4a6a8a;
            border-color: #aaddff;
        }

        .inv-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="title">🗺️ ZEMLI</div>
    <div class="biome-info" id="biomeInfo">Равнина</div>
    <div class="coordinates" id="coords">X: 0, Y: 0</div>

    <div class="action-panel">
        <button class="action-btn" id="actionBuild">🏗️ Построить</button>
        <button class="action-btn" id="actionMove">🚚 Переместить</button>
        <button class="action-btn" id="actionArmy">⚔️ Армия</button>
        <button class="action-btn" id="actionHome">🏠 К зданию</button>
    </div>

    <div class="inventory-panel" id="inventoryPanel">
        <div class="inv-title">📦 Инвентарь</div>
        <button class="inv-btn" data-type="lumber" data-cost="10 wood">🪓 Лесопилка (10 🪵)</button>
        <button class="inv-btn" data-type="mine" data-cost="15 stone">⛏️ Шахта (15 🪨)</button>
        <button class="inv-btn" data-type="farm" data-cost="5 wood">🌾 Ферма (5 🪵)</button>
        <button class="inv-btn" data-type="barracks" data-cost="20 iron">⚔️ Казарма (20 ⚔️)</button>
        <button class="inv-btn" data-type="wall" data-cost="10 stone">🧱 Стена (10 🪨)</button>
        <button class="inv-btn" data-type="tower" data-cost="15 wood 10 stone">🗼 Вышка (15🪵 10🪨)</button>
        <button class="inv-btn" data-type="gold" data-cost="30 gold">💰 Золотая шахта (30💰)</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
